name: Build & push trainer image to GHCR

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
    paths:
      - "Dockerfile.trainer"
      - "restore-fleet.json"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trainer repo
        uses: actions/checkout@v4
        with:
          repository: gHashTag/trios-trainer-igla
          path: trainer

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (cached, multi-tag)
        uses: docker/build-push-action@v6
        with:
          context: trainer
          file: trainer/Dockerfile
          push: true
          tags: |
            ghcr.io/ghashtag/trios-trainer-igla:latest
            ghcr.io/ghashtag/trios-trainer-igla:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
